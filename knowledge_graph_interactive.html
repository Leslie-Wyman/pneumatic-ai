                border-radius: 50px; border: 1px solid #000; box-shadow: 0 4px 10px rgba(0,0,0,0.1);">

               style="padding: 10px 15px; border: 1px solid #ccc; border-radius: 20px; background: #fff; 
                      color: #000; outline: none; width: 280px; font-size: 14px; font-weight: bold;
                      transition: border-color 0.3s;">
        <button id="custom-search-btn" 
                style="padding: 10px 20px; background: #000; color: #fff; border: 1px solid #000; 
                       border-radius: 20px; cursor: pointer; font-weight: bold; font-size: 14px;
                       transition: background 0.3s, color 0.3s;">
            搜索
        </button>
    </div>

    <script>
        // 按钮悬停效果
        var btn = document.getElementById('custom-search-btn');
        btn.onmouseover = function() {
            this.style.background = '#444';
        }
        btn.onmouseout = function() {
            this.style.background = '#000';
        }

        // 输入框聚焦效果
        var input = document.getElementById('custom-search-input');
        input.onfocus = function() {
            this.style.borderColor = '#000';
        }
        input.onblur = function() {
            this.style.borderColor = '#ccc';
        }

        document.getElementById('custom-search-btn').onclick = function() {
            var query = document.getElementById('custom-search-input').value.toLowerCase().trim();
            if (!query) return;

            var allNodes = nodes.get(); 
            var targetNodeId = null;

            for (var i = 0; i < allNodes.length; i++) {
                var nodeId = String(allNodes[i].id).toLowerCase();
                if (nodeId === query || nodeId.includes(query)) {
                    targetNodeId = allNodes[i].id;
                    break;
                }
            }

            if (targetNodeId) {
                var checkReady = setInterval(function() {
                    if (typeof network !== 'undefined') {
                        clearInterval(checkReady);
                        // 关闭自适应反弹
                        network.setOptions({ physics: { stabilization: { fit: false } } });
                        // 聚焦放大
                        network.focus(targetNodeId, {
                            scale: 1.5,
                            animation: { duration: 1200, easingFunction: "easeInOutCubic" }
                        });
                        network.selectNodes([targetNodeId]);

                        setTimeout(function() { 
                            network.focus(targetNodeId, { scale: 1.5 }); 
                        }, 2500);
                    }
                }, 200);
            } else {
                alert("知识图谱中未收录该节点：[" + query + "]");
            }
        };

        document.getElementById('custom-search-input').addEventListener("keypress", function(event) {
            if (event.key === "Enter") {
                event.preventDefault();
                document.getElementById('custom-search-btn').click();
            }
        });
    </script>
    </body>
    
</html>
